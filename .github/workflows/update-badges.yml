name: Update Badges
on:
  schedule:
    - cron: "0 2 * * *" # Updates daily at 2 AM
  workflow_dispatch: # Allows manual trigger

jobs:
  update-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Badge Readme Action
        uses: pemtajo/badge-readme@main
        with:
          CREDLY_USER: michael-nault
          NUMBER_LAST_BADGES: 10
